<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Orchestration Live Dashboard</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --critical: #ef4444;
      --medium: #f59e0b;
      --low: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.15), transparent 40%),
        radial-gradient(circle at 90% 20%, rgba(239, 68, 68, 0.12), transparent 45%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .hero {
      background: rgba(17, 24, 39, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .hero h1 {
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(34, 211, 238, 0.2);
      color: var(--text);
      cursor: pointer;
      transition: transform 150ms ease, background 150ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(34, 211, 238, 0.35);
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(17, 24, 39, 0.82);
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 12px;
    }

    .stat h3 {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .stat p {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .feed {
      background: rgba(17, 24, 39, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 14px;
    }

    .feed h2 {
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    .notification-list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-left-width: 5px;
      border-radius: 10px;
      padding: 12px;
      animation: reveal 260ms ease;
    }

    .item.low { border-left-color: var(--low); }
    .item.medium { border-left-color: var(--medium); }
    .item.critical { border-left-color: var(--critical); }

    .item-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .item-message {
      font-size: 0.97rem;
      line-height: 1.4;
    }

    .connected {
      color: #22c55e;
      font-weight: 700;
    }

    .disconnected {
      color: #ef4444;
      font-weight: 700;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<div class="container">
  <section class="hero">
    <h1>Context-Aware Notification Orchestration</h1>
    <p>Observe how the system suppresses, merges, and prioritizes notifications in real time.</p>
    <div class="actions">
      <button onclick="triggerScenario('message-burst')">Simulate 5 Messages</button>
      <button onclick="triggerScenario('battery-low')">Simulate Battery Low</button>
      <button onclick="triggerScenario('user-inactive')">Simulate User Inactive</button>
      <button onclick="triggerScenario('critical-alert')">Simulate Critical Alert</button>
      <button onclick="triggerScenario('full-story')">Run Full Story</button>
    </div>
  </section>

  <section class="status-row">
    <div class="stat">
      <h3>WebSocket</h3>
      <p id="socket-status" class="disconnected">Disconnected</p>
    </div>
    <div class="stat">
      <h3>Total Delivered</h3>
      <p id="total-count">0</p>
    </div>
    <div class="stat">
      <h3>Critical Delivered</h3>
      <p id="critical-count">0</p>
    </div>
  </section>

  <section class="feed">
    <h2>Delivery Stream</h2>
    <div id="feed" class="notification-list"></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
  const feedEl = document.getElementById("feed");
  const totalCountEl = document.getElementById("total-count");
  const criticalCountEl = document.getElementById("critical-count");
  const socketStatusEl = document.getElementById("socket-status");

  let total = 0;
  let critical = 0;

  function addItem(notification) {
    total += 1;
    if ((notification.priority || "").toUpperCase() === "CRITICAL") {
      critical += 1;
    }

    totalCountEl.textContent = String(total);
    criticalCountEl.textContent = String(critical);

    const item = document.createElement("div");
    const level = (notification.priority || "LOW").toLowerCase();
    item.className = `item ${level.includes('critical') ? 'critical' : level.includes('medium') ? 'medium' : 'low'}`;

    const date = new Date(notification.dispatchedAt || Date.now()).toLocaleTimeString();

    item.innerHTML = `
      <div class="item-header">
        <span>${notification.channel || "PUSH"} | ${notification.priority || "LOW"} | ${notification.source || "EVENT"}</span>
        <span>${date}</span>
      </div>
      <div class="item-message">${notification.message || "No message"}</div>
    `;

    feedEl.prepend(item);
    while (feedEl.children.length > 40) {
      feedEl.removeChild(feedEl.lastChild);
    }
  }

  async function triggerScenario(scenario) {
    try {
      await fetch(`http://localhost:8081/api/events/demo/${scenario}?userId=user-1`, { method: "POST" });
    } catch (err) {
      console.error("Failed to trigger scenario", err);
    }
  }

  function connect() {
    const socket = new SockJS("/ws");
    const stompClient = Stomp.over(socket);
    stompClient.debug = () => {};

    stompClient.connect({}, () => {
      socketStatusEl.textContent = "Connected";
      socketStatusEl.className = "connected";
      stompClient.subscribe("/topic/notifications", (message) => {
        const notification = JSON.parse(message.body);
        addItem(notification);
      });
    }, () => {
      socketStatusEl.textContent = "Disconnected";
      socketStatusEl.className = "disconnected";
      setTimeout(connect, 1500);
    });
  }

  connect();

  fetch("/api/notifications/recent")
    .then((res) => res.json())
    .then((items) => {
      items.reverse().forEach(addItem);
    })
    .catch(() => {});
</script>
</body>
</html>
